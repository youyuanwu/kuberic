# Canonical KinD cluster config for xedio workloads.
# NodePort mappings expose services to the host for dev/test access.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30090  # kvstore-rw client (app port 8080)
        hostPort: 30090
        protocol: TCP
