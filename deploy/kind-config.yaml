# Canonical KinD cluster config for all xedio workloads.
# NodePort mappings expose services to the host for dev/test access.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # xdata-app pods (NodePort services)
      - containerPort: 30081  # xdata-app-0
        hostPort: 30081
        protocol: TCP
      - containerPort: 30082  # xdata-app-1
        hostPort: 30082
        protocol: TCP
      - containerPort: 30083  # xdata-app-2
        hostPort: 30083
        protocol: TCP
      # kvstore (NodePort services)
      - containerPort: 30090  # kvstore-rw client (app port 8080)
        hostPort: 30090
        protocol: TCP
