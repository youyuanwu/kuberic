---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: xdataapps.xedio.io
spec:
  group: xedio.io
  names:
    kind: XdataApp
    listKind: XdataAppList
    plural: xdataapps
    shortNames:
    - xapp
    singular: xdataapp
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              replicas:
                type: integer
                default: 3
                minimum: 1
                maximum: 10
              image:
                type: string
                default: "localhost/xdata-app:latest"
              imagePullPolicy:
                type: string
                default: "IfNotPresent"
                enum:
                - Always
                - IfNotPresent
                - Never
              storage:
                type: string
                default: "256Mi"
              resources:
                type: object
                properties:
                  requests:
                    type: object
                    properties:
                      memory:
                        type: string
                        default: "64Mi"
                      cpu:
                        type: string
                        default: "100m"
                  limits:
                    type: object
                    properties:
                      memory:
                        type: string
                        default: "256Mi"
                      cpu:
                        type: string
                        default: "500m"
              port:
                type: integer
                default: 8080
              env:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - value
                  properties:
                    name:
                      type: string
                    value:
                      type: string
              nodePortEnabled:
                type: boolean
                default: true
              nodePortBase:
                type: integer
                default: 30081
                minimum: 30000
                maximum: 32767
          status:
            type: object
            properties:
              state:
                type: string
              readyReplicas:
                type: integer
              observedGeneration:
                type: integer
              error:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Ready
      type: integer
      jsonPath: .status.readyReplicas
    - name: State
      type: string
      jsonPath: .status.state
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
