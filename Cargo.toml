[workspace]
resolver = "2"
members = ["apps/xcontrollers", "apps/xdata-app", "apps/xdata-operator","xedio-data"

, "xedio-shared", "xedio-tests"]

[workspace.dependencies]
mssf-com = {version = "0.5" }
mssf-core = "0.5"
mssf-pal = "0.5"
mssf-util = "0.5"
tokio-util = "0.7"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
bytes = "1"
futures = "0.3"
async-trait = "0.1"
serde = "1"
serde_json = "1"
tracing = "0.1"
tonic = "0.14"
prost = "0.14"
tonic-prost-build = "0.14"
tonic-prost = "0.14"
tracing-subscriber = "0.3"
kube-leader-election = "0.42.0"
kube = { version = "2", features = ["runtime", "derive"] }
kube-lease-manager = "0.10.0"
k8s-openapi = { version = "0.26", features = ["latest", "schemars"] }
kuberator = "0.2"
rand = "0.9"
schemars = "1"
test-log = {version = "0.2", default-features = false, features = ["trace"]}

# example deps
anyhow = "1"
thiserror = "1"
serde_yaml = "0.9"

xedio-data = { path = "xedio-data" }
xedio-shared = { path = "xedio-shared" }
xedio-tests = { path = "xedio-tests" }
xdata-app = { path = "apps/xdata-app" }
