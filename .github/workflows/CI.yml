name: build

on: [push, pull_request]


env:
  XEDIO_CI: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    steps:
    - uses: actions/checkout@v5

    - name: Read rust version from rust-toolchain.toml
      id: rust-version
      run: echo "version=$(grep '^channel' rust-toolchain.toml | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

    - name: Install rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ steps.rust-version.outputs.version }}
        components: rustfmt, clippy

    - uses: Swatinem/rust-cache@v2
    
    - uses: taiki-e/install-action@protoc

    - name: Install PostgreSQL
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq postgresql postgresql-client
        # Stop the default PG service (tests manage their own instances)
        sudo systemctl stop postgresql.service || true
        pg_config --version

    - name: Run cargo check
      run: cargo check --all-targets

    - name: Run cargo fmt
      run: cargo fmt --all -- --check
    
    - name: Run cargo clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Build all targets
      run: cargo build --all-targets

    - name: Kubernetes KinD Cluster
      id: kind
      uses: helm/kind-action@v1
      with:
        cluster_name: kind
        config: deploy/kind-config.yaml

    - name: Cmake Configure
      run: cmake -S . -B build

    - name: Build Docker Image
      run: cmake --build build --target all

    - name: Run cargo test
      run: cargo test --all -- --nocapture