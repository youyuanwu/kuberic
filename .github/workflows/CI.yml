name: build

on: [push, pull_request]


env:
  XEDIO_CI: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94.1
        components: rustfmt, clippy
    
    - uses: taiki-e/install-action@protoc

    - name: Run cargo check
      run: cargo check

    - name: Run cargo fmt
      run: cargo fmt --all -- --check
    
    - name: Run cargo clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Kubernetes KinD Cluster
      id: kind
      uses: helm/kind-action@v1
      with:
        cluster_name: kind
        config: deploy/kind-config.yaml

    - name: Cmake Configure
      run: cmake -S . -B build

    - name: Build Docker Image
      run: cmake --build build --target all

    # Rust test auto deploys.
    # - name: Deploy to KinD
    #   run: cmake --build build --target xdata-deploy xdata-op-deploy

    # - name: Wait for xdata-app StatefulSet
    #   run: |
    #     kubectl wait --for=jsonpath='{.status.readyReplicas}'=3 --timeout=120s statefulset/xdata-app -n xedio

    # - name: Wait for xdata-operator Deployment
    #   run: |
    #     kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 --timeout=120s deployment/xdata-operator -n xedio

    - name: Run cargo test
      run: cargo test --all -- --nocapture