syntax = "proto3";
package kubelicate.replication.v1;

// ---- Shared types ----

message EpochProto {
    int64 data_loss_number = 1;
    int64 configuration_number = 2;
}

enum RoleProto {
    ROLE_NONE = 0;
    ROLE_PRIMARY = 1;
    ROLE_ACTIVE_SECONDARY = 2;
    ROLE_IDLE_SECONDARY = 3;
}

enum ReplicaStatusProto {
    STATUS_UP = 0;
    STATUS_DOWN = 1;
}

enum QuorumModeProto {
    QUORUM_ALL = 0;
    QUORUM_WRITE = 1;
}

enum OpenModeProto {
    OPEN_NEW = 0;
    OPEN_EXISTING = 1;
}

message ReplicaInfoProto {
    int64 id = 1;
    RoleProto role = 2;
    ReplicaStatusProto status = 3;
    string replicator_address = 4;
    int64 current_progress = 5;
    int64 catch_up_capability = 6;
    bool must_catch_up = 7;
}

message ReplicaSetConfigProto {
    repeated ReplicaInfoProto members = 1;
    uint32 write_quorum = 2;
}

// ---- Control plane: Operator → Pod ----

service ReplicatorControl {
    rpc Open(OpenRequest) returns (OpenResponse);
    rpc Close(CloseRequest) returns (CloseResponse);

    rpc ChangeRole(ChangeRoleRequest) returns (ChangeRoleResponse);
    rpc UpdateEpoch(UpdateEpochRequest) returns (UpdateEpochResponse);

    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

    rpc UpdateCatchUpConfiguration(UpdateCatchUpConfigRequest) returns (UpdateCatchUpConfigResponse);
    rpc UpdateCurrentConfiguration(UpdateCurrentConfigRequest) returns (UpdateCurrentConfigResponse);
    rpc WaitForCatchUpQuorum(WaitForCatchUpQuorumRequest) returns (WaitForCatchUpQuorumResponse);
    rpc BuildReplica(BuildReplicaRequest) returns (BuildReplicaResponse);
    rpc RemoveReplica(RemoveReplicaRequest) returns (RemoveReplicaResponse);
    rpc OnDataLoss(OnDataLossRequest) returns (OnDataLossResponse);
    rpc RevokeWriteStatus(RevokeWriteStatusRequest) returns (RevokeWriteStatusResponse);
}

message OpenRequest {
    OpenModeProto mode = 1;
}
message OpenResponse {}

message CloseRequest {}
message CloseResponse {}

message ChangeRoleRequest {
    EpochProto epoch = 1;
    RoleProto role = 2;
}
message ChangeRoleResponse {}

message UpdateEpochRequest {
    EpochProto epoch = 1;
}
message UpdateEpochResponse {}

message GetStatusRequest {}
message GetStatusResponse {
    RoleProto role = 1;
    EpochProto epoch = 2;
    int64 current_progress = 3;
    int64 catch_up_capability = 4;
    int64 committed_lsn = 5;
    bool healthy = 6;
}

message UpdateCatchUpConfigRequest {
    ReplicaSetConfigProto current = 1;
    ReplicaSetConfigProto previous = 2;
}
message UpdateCatchUpConfigResponse {}

message UpdateCurrentConfigRequest {
    ReplicaSetConfigProto current = 1;
}
message UpdateCurrentConfigResponse {}

message WaitForCatchUpQuorumRequest {
    QuorumModeProto mode = 1;
}
message WaitForCatchUpQuorumResponse {}

message BuildReplicaRequest {
    ReplicaInfoProto replica = 1;
}
message BuildReplicaResponse {}

message RemoveReplicaRequest {
    int64 replica_id = 1;
}
message RemoveReplicaResponse {}

message OnDataLossRequest {}
message OnDataLossResponse {
    bool state_changed = 1;
}

message RevokeWriteStatusRequest {}
message RevokeWriteStatusResponse {}

// ---- Data plane: Pod ↔ Pod (replication + copy) ----

service ReplicatorData {
    // Incremental replication: primary streams ops, secondary ACKs
    rpc ReplicationStream(stream ReplicationItem) returns (stream ReplicationAck);

    // Copy protocol: primary ↔ secondary during BuildReplica
    // 1. Primary calls GetCopyContext on secondary → secondary sends its context
    rpc GetCopyContext(GetCopyContextRequest) returns (GetCopyContextResponse);
    // 2. Primary streams full state to secondary
    rpc CopyStream(stream CopyItem) returns (CopyStreamResponse);
}

message ReplicationItem {
    int64 epoch_data_loss = 1;
    int64 epoch_config = 2;
    int64 lsn = 3;
    bytes data = 4;
    // Primary's current quorum-committed LSN. Secondaries use this to:
    // 1. Track which ops are committed (for UpdateEpoch rollback boundary)
    // 2. GC their internal operation queues
    // 3. Trigger deferred page application (SQLite app)
    // Matches SF's completedSequenceNumber in ReplicationOperationHeader.
    int64 committed_lsn = 5;
}

message ReplicationAck {
    int64 lsn = 1;
}

message GetCopyContextRequest {}
message GetCopyContextResponse {
    repeated RawOperation operations = 1;
}

message RawOperation {
    int64 lsn = 1;
    bytes data = 2;
}

message CopyItem {
    int64 lsn = 1;
    bytes data = 2;
}

message CopyStreamResponse {
    int64 items_received = 1;
}
