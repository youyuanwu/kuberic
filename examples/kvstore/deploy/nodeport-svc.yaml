# NodePort service for kvstore-rw — dev/test access via KinD extraPortMappings.
# Overlays the operator-created ClusterIP kvstore-rw service with a NodePort
# so the client port (8080) is reachable at localhost:30090.
apiVersion: v1
kind: Service
metadata:
  name: kvstore-rw
  namespace: xedio
  labels:
    kuberic.io/set: kvstore
spec:
  type: NodePort
  selector:
    kuberic.io/set: kvstore
    kuberic.io/role: primary
  ports:
    - name: app
      port: 8080
      targetPort: 8080
      nodePort: 30090
