syntax = "proto3";

package kvstore.v1;

service KvStore {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string value = 2;
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  int64 lsn = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool existed = 1;
  int64 lsn = 2;
}
